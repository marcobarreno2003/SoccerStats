<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Blog - Soccer Stats</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="/">Soccer Stats</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/blog">Blog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">About Me</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/stats">Soccer Stats</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4">Blog</h1>

        {% for post in blog_posts %}
        <div class="card mb-4">
            <div class="card-body">
                <h3 class="card-title">{{ post.title }}</h3>
                <p class="text-muted">Fecha: {{ post.date }}</p>
                <hr>
                <div class="card-text">
                    {{ post.content | safe }}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <p>&copy; 2024 Soccer Stats | Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

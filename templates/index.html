<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Soccer Stats</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="/">Soccer Stats</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/blog">Blog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">About Me</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/stats">Soccer Stats</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Welcome to Soccer Stats</h1>
        <p>This is your one-stop platform for soccer statistics and project updates!</p>

        <!-- Aquí aparecerán los datos de los partidos -->
        <div id="matches">
            <h2>Loading matches...</h2>
        </div>
    </div>

    <script>
        // Código para obtener los datos de los partidos desde el API
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/matches')
                .then(response => response.json())
                .then(data => {
                    // Eliminar el mensaje de "Loading..."
                    const matchesDiv = document.getElementById("matches");
                    matchesDiv.innerHTML = ""; // Limpiar el contenido

                    // Recorrer los datos de los partidos
                    data.forEach(match => {
                        const matchInfo = `
                            <div class="match-card">
                                <h3>${match.home_team} vs ${match.away_team}</h3>
                                <p>Score: ${match.home_score} - ${match.away_score}</p>
                                <p>Competition: ${match.competition_name} (${match.season})</p>
                                <h5>Goals:</h5>
                                <ul>
                                    ${match.goals.map(goal => `<li>${goal.team} - ${goal.scorer} (${goal.minute}')</li>`).join('')}
                                </ul>
                                <h5>Cards:</h5>
                                <ul>
                                    ${match.cards.map(card => `<li>${card.team} - ${card.player} (${card.card_type}, ${card.minute}')`).join('')}
                                </ul>
                                <h5>Starting Lineups:</h5>
                                <div>
                                    <strong>${match.home_team}:</strong> ${match.starting_lineups[match.home_team].join(', ')}
                                    <br>
                                    <strong>${match.away_team}:</strong> ${match.starting_lineups[match.away_team].join(', ')}
                                </div>
                                <hr>
                            </div>
                        `;
                        matchesDiv.innerHTML += matchInfo;
                    });
                })
                .catch(error => {
                    document.getElementById("matches").innerHTML = "<p>Failed to load matches.</p>";
                    console.error("Error fetching matches:", error);
                });
        });
    </script>
</body>
</html>
